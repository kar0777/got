name: Assemble distribution package

on:
  push:
    paths:
      - "package-parts/**"
      - ".github/workflows/assemble-package.yml"
  pull_request:
    paths:
      - "package-parts/**"
      - ".github/workflows/assemble-package.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Inspect package parts
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import hashlib

          parts = sorted(Path("package-parts").glob("GitLabDuoCLI-Switcher-v8.3.2.zip.b64.part-*"))
          lines = [f"parts={len(parts)}"]
          chunks = []
          for path in parts:
              text = "".join(path.read_text(encoding="utf-8").split())
              lines.append(f"{path.name}={len(text)}")
              chunks.append(text)

          encoded = "".join(chunks)
          lines.append(f"base64_length={len(encoded)}")
          try:
              data = base64.b64decode(encoded, validate=True)
              lines.append(f"decoded_size={len(data)}")
              lines.append(f"sha256={hashlib.sha256(data).hexdigest()}")
          except Exception as exc:
              lines.append(f"decode_error={type(exc).__name__}: {exc}")

          Path("PACKAGE_DIAGNOSTICS.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")
          print("\n".join(lines))
          PY

      - name: Assemble ZIP and extract browsable source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist src

          python3 - <<'PY'
          from pathlib import Path
          import base64

          parts = sorted(Path("package-parts").glob("GitLabDuoCLI-Switcher-v8.3.2.zip.b64.part-*"))
          if not parts:
              raise SystemExit("No package payload parts found")
          encoded = "".join("".join(path.read_text(encoding="utf-8").split()) for path in parts)
          if len(encoded) != 73440:
              raise SystemExit(f"Unexpected base64 length: {len(encoded)}")
          Path("dist/GitLabDuoCLI-Switcher-v8.3.2.zip").write_bytes(base64.b64decode(encoded, validate=True))
          PY

          rm -rf src/*
          unzip -j -o dist/GitLabDuoCLI-Switcher-v8.3.2.zip \
            'GitLabDuoCLI-Switcher/*' \
            -d src

          test -f src/Run.cmd
          test -f src/GitLabDuoCLI-Switcher.ps1
          test -f src/DuoTerminalRecorder.cs
          test -f src/README.txt

      - name: Verify package hash and contents
        shell: bash
        run: |
          set -euo pipefail
          sha256sum dist/GitLabDuoCLI-Switcher-v8.3.2.zip | tee dist/SHA256SUMS.txt
          unzip -t dist/GitLabDuoCLI-Switcher-v8.3.2.zip

      - name: Commit diagnostics and generated distribution
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PACKAGE_DIAGNOSTICS.txt
          test ! -d dist || git add dist
          test ! -d src || git add src
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "build: publish package diagnostics and distribution"
          git push
