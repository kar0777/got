name: Assemble distribution package

on:
  push:
    paths:
      - "package-parts/**"
      - ".github/workflows/assemble-package.yml"
  pull_request:
    paths:
      - "package-parts/**"
      - ".github/workflows/assemble-package.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Assemble ZIP and extract browsable source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist src

          python3 - <<'PY'
          from pathlib import Path
          import base64

          parts = sorted(Path("package-parts").glob("GitLabDuoCLI-Switcher-v8.3.2.zip.b64.part-*"))
          if len(parts) != 13:
              raise SystemExit(f"Expected 13 package parts, found {len(parts)}")

          chunks = []
          for path in parts:
              text = "".join(path.read_text(encoding="utf-8").split())
              print(f"{path.name}: {len(text)} characters")
              chunks.append(text)

          encoded = "".join(chunks)
          print(f"Total base64 length: {len(encoded)}")
          if len(encoded) != 73440:
              raise SystemExit("Unexpected base64 length; one or more package parts are damaged")

          data = base64.b64decode(encoded, validate=True)
          print(f"Decoded ZIP size: {len(data)} bytes")
          Path("dist/GitLabDuoCLI-Switcher-v8.3.2.zip").write_bytes(data)
          PY

          rm -rf src/*
          unzip -j -o dist/GitLabDuoCLI-Switcher-v8.3.2.zip \
            'GitLabDuoCLI-Switcher/*' \
            -d src

          test -f src/Run.cmd
          test -f src/GitLabDuoCLI-Switcher.ps1
          test -f src/DuoTerminalRecorder.cs
          test -f src/README.txt

      - name: Verify package hash and contents
        shell: bash
        run: |
          set -euo pipefail
          sha256sum dist/GitLabDuoCLI-Switcher-v8.3.2.zip | tee dist/SHA256SUMS.txt
          unzip -t dist/GitLabDuoCLI-Switcher-v8.3.2.zip

      - name: Commit generated distribution
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist src
          if git diff --cached --quiet; then
            echo "Generated files are already up to date."
            exit 0
          fi
          git commit -m "build: publish GitLab Duo CLI Switcher v8.3.2"
          git push
